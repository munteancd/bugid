<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BugID — identificator insecte</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1f9d55">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header><h1>🐛 BugID</h1></header>
  <main>

    <button id="capture-btn">📷 Fă o poză</button>
    <div id="status"></div>
    <div id="result"></div>
    <section id="journal"><h2>Jurnal</h2><div id="journal-list"></div></section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
